<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WebFlow AI — Build professional websites in minutes with drag-and-drop simplicity. No coding required.">
  <meta property="og:title" content="WebFlow AI — AI-Powered Website Builder">
  <meta property="og:description" content="Create stunning, responsive websites with drag-and-drop ease. 10 themes, visual effects, compliance automation.">
  <title>WebFlow AI — Intelligent Website Builder</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css?v=2">
  <link rel="stylesheet" href="css/themes.css?v=2">
  <link rel="stylesheet" href="css/onboarding.css?v=2">
  <link rel="stylesheet" href="css/builder.css?v=2">
  <link rel="stylesheet" href="css/builder-panel.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/effects.css?v=2">
  <link rel="stylesheet" href="css/responsive.css?v=2">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect width='48' height='48' rx='12' fill='%238257e5'/><path d='M14 34V14l10 10 10-10v20' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/></svg>">
</head>
<body>

  <!-- ============ BUILDER ============ -->
  <div class="builder" id="builder">
    
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="toolbar-logo">
          <svg viewBox="0 0 48 48" fill="none" width="28" height="28"><rect width="48" height="48" rx="12" fill="url(#tg)"/><path d="M14 34V14l10 10 10-10v20" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="tg" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#8257e5"/><stop offset="1" stop-color="#c084fc"/></linearGradient></defs></svg>
          <span class="toolbar-logo-text">WebFlow AI</span>
        </div>
        <div class="toolbar-actions">
          <button class="btn-icon btn-ghost tooltip" id="btn-undo" data-tooltip="Undo (Ctrl+Z)" style="opacity:0.3">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 0 1 0 10H9"/><path d="M7 14l-4-4 4-4"/></svg>
          </button>
          <button class="btn-icon btn-ghost tooltip" id="btn-redo" data-tooltip="Redo (Ctrl+Y)" style="opacity:0.3">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H11a5 5 0 0 0 0 10h4"/><path d="M17 14l4-4-4-4"/></svg>
          </button>
        </div>
      </div>

      <div class="toolbar-center">
        <div class="device-toggle">
          <button class="device-btn active tooltip" data-device="desktop" data-tooltip="Desktop">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          </button>
          <button class="device-btn tooltip" data-device="tablet" data-tooltip="Tablet">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M12 18h.01"/></svg>
          </button>
          <button class="device-btn tooltip" data-device="mobile" data-tooltip="Mobile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="3"/><path d="M12 18h.01"/></svg>
          </button>
        </div>
      </div>

      <div class="toolbar-right">
        <button class="btn-icon btn-ghost tooltip sound-toggle" id="btn-sound" data-tooltip="Sound Effects">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
        <div class="toolbar-divider"></div>
        <button class="btn btn-accent-subtle btn-sm tooltip" id="btn-theme-quick" data-tooltip="Change Theme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          Theme
        </button>
        <button class="btn btn-accent-subtle btn-sm tooltip" id="btn-seo-quick" data-tooltip="SEO Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          SEO
        </button>
        <div class="toolbar-divider"></div>
        <button class="btn btn-ghost btn-sm tooltip" id="btn-new" data-tooltip="Start Over">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          New
        </button>
        <button class="btn btn-secondary btn-sm" id="btn-preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Preview
        </button>
        <button class="btn btn-secondary btn-sm" id="btn-code">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Code
        </button>
        <button class="btn btn-primary btn-sm" id="btn-export">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
      </div>
    </div>

    <!-- Content Area -->
    <div class="builder-content">
      
      <!-- Left Sidebar -->
      <div class="sidebar" id="sidebar-panel">
        <div class="sidebar-header">
          <div class="sidebar-search-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input class="sidebar-search" placeholder="Search components..." type="text">
          </div>
          <div class="panel-controls">
            <button class="panel-ctrl-btn tooltip" data-action="swap" data-tooltip="Swap Side" title="Swap Side">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16l-4-4 4-4"/><path d="M17 8l4 4-4 4"/><path d="M3 12h18"/></svg>
            </button>
            <button class="panel-ctrl-btn tooltip" data-action="minimize" data-tooltip="Minimize" title="Minimize">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h16"/></svg>
            </button>
            <button class="panel-ctrl-btn tooltip" data-action="maximize" data-tooltip="Maximize" title="Maximize">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            </button>
          </div>
        </div>
        <div class="sidebar-tabs">
          <button class="sidebar-tab active">Components</button>
          <button class="sidebar-tab">Pages</button>
        </div>
        <div class="sidebar-body">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Canvas -->
      <div class="canvas-wrapper">
        <div class="canvas" id="canvas" data-theme="minimalist">
          <div class="canvas-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M12 8v8M8 12h8"/></svg>
            <h3>Start Building</h3>
            <p>Drag components from the sidebar or double-click to add them to your website.</p>
          </div>
        </div>
      </div>

      <!-- Properties Panel -->
      <div class="properties-panel" id="properties-panel">
        <div class="panel-header">
          <span class="panel-title">Properties</span>
          <div class="panel-controls">
            <button class="panel-ctrl-btn tooltip" data-action="swap" data-tooltip="Swap Side" title="Swap Side">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16l-4-4 4-4"/><path d="M17 8l4 4-4 4"/><path d="M3 12h18"/></svg>
            </button>
            <button class="panel-ctrl-btn tooltip" data-action="minimize" data-tooltip="Minimize" title="Minimize">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h16"/></svg>
            </button>
            <button class="panel-ctrl-btn tooltip" data-action="maximize" data-tooltip="Maximize" title="Maximize">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            </button>
          </div>
        </div>
        <div class="panel-body">
          <!-- Populated by JS -->
        </div>
      </div>

    </div>
  </div>

  <!-- ============ PREVIEW OVERLAY ============ -->
  <div class="preview-overlay" id="preview-overlay">
    <div class="preview-toolbar">
      <span style="font-weight:600;font-size:var(--text-sm)">Full Preview</span>
      <div class="device-toggle">
        <button class="device-btn active" data-device="desktop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        </button>
        <button class="device-btn" data-device="tablet">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M12 18h.01"/></svg>
        </button>
        <button class="device-btn" data-device="mobile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="3"/><path d="M12 18h.01"/></svg>
        </button>
      </div>
      <button class="btn btn-secondary btn-sm preview-close-btn">✕ Close</button>
    </div>
    <div class="preview-frame"></div>
  </div>

  <!-- Scripts (order matters) -->
  <script src="js/icons.js?v=3"></script>
  <script src="js/utils.js?v=3"></script>
  <script src="js/sounds.js?v=3"></script>
  <script src="js/components.js?v=3"></script>
  <script src="js/themes.js?v=3"></script>
  <script src="js/effects.js?v=3"></script>
  <script src="js/preview.js?v=3"></script>
  <script src="js/compliance.js?v=3"></script>
  <script src="js/seo.js?v=3"></script>
  <script src="js/export.js?v=3"></script>
  <script src="js/panels.js?v=3"></script>
  <script src="js/builder.js?v=3"></script>
  <script src="js/onboarding.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
